name: Deploy OpenGarden Designer

on:
  push:
    branches:
      - master
    paths:
      - "apps/designer/**"
      - "cad/openscad/**"
      - ".github/workflows/deploy-designer-pages.yml"
      - "NuGet.Config"
      - "global.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Publish designer
        run: dotnet publish apps/designer/OpenGarden.Designer.csproj -c Release -o artifacts/designer

      - name: Prepare GitHub Pages base path
        shell: bash
        run: |
          touch artifacts/designer/wwwroot/.nojekyll
          sed -i 's#<base href="/" />#<base href="/OpenGarden/" />#' artifacts/designer/wwwroot/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: artifacts/designer/wwwroot
          include-hidden-files: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
