<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f7f8f5"/>
  <text x="80" y="82" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#1e2b24">Approach 2: support base inside water container</text>
  <text x="80" y="124" font-family="Arial, sans-serif" font-size="22" fill="#526158">The shell only locates the pot in X/Y. A raised base or ribs inside the reservoir control the pot height from below.</text>

  <path d="M276 218 H924 L884 650 H316 Z" fill="#c8d7dd" stroke="#51656d" stroke-width="5"/>
  <rect x="150" y="190" width="900" height="44" rx="4" fill="#6f7f76"/>
  <path d="M468 234 H732 L700 570 H500 Z" fill="#d8dfd9" stroke="#5a665f" stroke-width="4"/>
  <rect x="404" y="572" width="392" height="36" rx="4" fill="#738979"/>
  <rect x="438" y="480" width="52" height="94" fill="#738979"/>
  <rect x="710" y="480" width="52" height="94" fill="#738979"/>

  <path d="M332 630 H868" stroke="#2f5f8f" stroke-width="4" stroke-dasharray="10 10"/>
  <text x="884" y="638" font-family="Arial, sans-serif" font-size="22" fill="#2f5f8f">reservoir bottom</text>
  <line x1="832" y1="234" x2="832" y2="572" stroke="#2f5f8f" stroke-width="4"/>
  <line x1="810" y1="234" x2="854" y2="234" stroke="#2f5f8f" stroke-width="4"/>
  <line x1="810" y1="572" x2="854" y2="572" stroke="#2f5f8f" stroke-width="4"/>
  <text x="868" y="388" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#2f5f8f">insert depth</text>
  <text x="868" y="421" font-family="Arial, sans-serif" font-size="24" fill="#2f5f8f">controlled by base height</text>

  <line x1="470" y1="574" x2="268" y2="456" stroke="#26352e" stroke-width="3"/>
  <text x="100" y="444" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#26352e">support ribs</text>
  <text x="100" y="474" font-family="Arial, sans-serif" font-size="20" fill="#526158">can be stepped or parametric</text>

  <rect x="96" y="636" width="1008" height="62" rx="8" fill="#e6ebe7"/>
  <text x="128" y="675" font-family="Arial, sans-serif" font-size="22" fill="#26352e">Best when reservoir/water container is the missing parent part and pot depth may vary per container.</text>
</svg>
