  <text x="96" y="460" font-family="Arial, sans-serif" font-size="20" fill="#526158">positive retention</text>

  <rect x="96" y="636" width="1008" height="62" rx="8" fill="#e6ebe7"/>
  <text x="128" y="675" font-family="Arial, sans-serif" font-size="22" fill="#26352e">Best when pots must not lift out accidentally, but it adds print tolerance and user-action complexity.</text>
