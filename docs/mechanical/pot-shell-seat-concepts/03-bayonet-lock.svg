  <text x="80" y="82" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#1e2b24">Approach 3: bayonet twist lock</text>
  <text x="80" y="124" font-family="Arial, sans-serif" font-size="22" fill="#526158">Small lugs on the pot pass through notches, then twist under the shell. A stop ramp can also set insertion depth.</text>

