<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">OpenGarden system architecture</title>
  <desc id="desc">Layered architecture showing OpenGrid mounting, holder, pot insert, reservoir, water transfer, and future control system.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 10; }
      .wet { fill: #dbeafe; stroke: #2563eb; }
      .dry { fill: #fef3c7; stroke: #d97706; }
      .future { fill: #f1f5f9; stroke: #64748b; stroke-dasharray: 7 6; }
      .title { font: 700 26px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 15px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .note { font: 14px Arial, sans-serif; fill: #475569; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="700"/>
  <text class="title" x="60" y="58">OpenGarden MVP Architecture</text>
  <text class="note" x="60" y="88">Mechanical structure is current; pump/control layer is planned future work.</text>

  <rect class="box" x="60" y="150" width="210" height="110"/>
  <text class="label" x="90" y="190">OpenGrid Wall</text>
  <text class="small" x="90" y="220">load-bearing mount</text>

  <rect class="box" x="350" y="130" width="250" height="150"/>
  <text class="label" x="382" y="175">Holder / Carrier</text>
  <text class="small" x="382" y="205">back plate</text>
  <text class="small" x="382" y="230">drain pan</text>
  <text class="small" x="382" y="255">reservoir space</text>

  <rect class="box wet" x="690" y="90" width="250" height="130"/>
  <text class="label" x="722" y="135">Pot Insert</text>
  <text class="small" x="722" y="165">soil and plant</text>
  <text class="small" x="722" y="190">bottom holes</text>

  <rect class="box wet" x="690" y="290" width="250" height="120"/>
  <text class="label" x="722" y="335">Reservoir</text>
  <text class="small" x="722" y="365">stored water</text>
  <text class="small" x="722" y="390">overflow TBD</text>

  <rect class="box future" x="990" y="180" width="150" height="140"/>
  <text class="label" x="1016" y="220">Water</text>
  <text class="label" x="1016" y="245">Transfer</text>
  <text class="small" x="1016" y="275">pump / wick</text>
  <text class="small" x="1016" y="300">future choice</text>

  <rect class="box dry" x="350" y="450" width="250" height="120"/>
  <text class="label" x="382" y="495">Control System</text>
  <text class="small" x="382" y="525">ESP32, pump driver</text>
  <text class="small" x="382" y="550">future dry module</text>

  <rect class="box future" x="690" y="500" width="250" height="110"/>
  <text class="label" x="722" y="545">Telemetry / UI</text>
  <text class="small" x="722" y="575">backend and dashboard</text>

  <path class="arrow" d="M270 205 H350"/>
  <text class="note" x="285" y="190">load path</text>
  <path class="arrow" d="M600 205 H690"/>
  <path class="arrow" d="M815 220 V290"/>
  <text class="note" x="830" y="260">drains to</text>
  <path class="arrow" d="M940 350 H1030 V320"/>
  <path class="arrow" d="M990 250 H940"/>
  <path class="arrow" d="M475 450 V280"/>
  <text class="note" x="490" y="375">future control</text>
  <path class="arrow" d="M600 510 H690"/>

  <line x1="320" y1="420" x2="980" y2="420" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 7"/>
  <text class="note" x="60" y="425">Wet zone above this line</text>
  <text class="note" x="60" y="455">Dry electronics stay separated</text>
</svg>
