<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="520" viewBox="0 0 1050 520" role="img" aria-labelledby="title desc">
  <title id="title">Wet and dry module separation</title>
  <desc id="desc">Wet plant, insert, reservoir, and tubing modules remain separated from dry ESP32 and power electronics.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .wet { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .dry { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 10; }
      .bar { stroke: #ef4444; stroke-width: 4; stroke-dasharray: 10 8; }
      .title { font: 700 26px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 15px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>
  <rect class="bg" width="1050" height="520"/>
  <text class="title" x="60" y="58">Wet / Dry Separation</text>

  <rect class="wet" x="80" y="120" width="390" height="290"/>
  <text class="label" x="120" y="165">Wet Zone</text>
  <text class="small" x="120" y="205">pot insert</text>
  <text class="small" x="120" y="235">drain / reservoir</text>
  <text class="small" x="120" y="265">pump tubing outlet</text>
  <text class="small" x="120" y="295">future moisture probe</text>

  <rect class="dry" x="580" y="120" width="390" height="290"/>
  <text class="label" x="620" y="165">Dry Zone</text>
  <text class="small" x="620" y="205">ESP32</text>
  <text class="small" x="620" y="235">pump driver</text>
  <text class="small" x="620" y="265">power connectors</text>
  <text class="small" x="620" y="295">backend/UI communication</text>

  <line class="bar" x1="525" y1="105" x2="525" y2="430"/>
  <text class="label" x="460" y="465">physical separation required</text>
</svg>
